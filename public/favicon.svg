<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#03050c"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90f7ff"/>
      <stop offset="55%" stop-color="#25d9ff"/>
      <stop offset="100%" stop-color="#7dffbf"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角面板背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#25d9ff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- 四角 HUD 标记 -->
  <g stroke="#ff5ea8" stroke-width="1.4" stroke-opacity="0.8" fill="none">
    <path d="M8 12 L8 8 L12 8"/>
    <path d="M56 12 L56 8 L52 8"/>
    <path d="M8 52 L8 56 L12 56"/>
    <path d="M56 52 L56 56 L52 56"/>
  </g>

  <!-- 霓虹星形 -->
  <path
    d="M32 11 L37.8 26.2 L53.5 31.8 L37.8 37.4 L32 53 L26.2 37.4 L10.5 31.8 L26.2 26.2 Z"
    fill="none"
    stroke="url(#star)"
    stroke-width="3.2"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- 中心亮点 -->
  <circle cx="32" cy="31.8" r="2.2" fill="#ff5ea8" filter="url(#glow)"/>
</svg>
